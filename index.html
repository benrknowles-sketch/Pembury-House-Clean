<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembury House Clean</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:wght@700;900&display=swap');

  :root {
    --bg: #f5f0e8;
    --card: #fff;
    --ink: #1a1a1a;
    --muted: #888;
    --accent: #2d5a27;
    --accent-light: #e8f0e6;
    --warn: #c0392b;
    --border: #e0d8cc;
    --wa: #25d366;
    --radius: 12px;
    --c0: #c0392b; --c0l: #fdecea; --c0b: #f5c6c2;
    --c1: #2d5a27; --c1l: #e8f0e6; --c1b: #c2d9bc;
    --c2: #5b6abf; --c2l: #eaecf8; --c2b: #c5c9e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 16px 16px 48px;
  }

  /* ── SETUP ── */
  #setupScreen { max-width: 420px; margin: 0 auto; }
  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    margin-top: 40px;
    text-align: center;
  }
  .setup-card h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem;
    margin-bottom: 6px;
  }
  .setup-card p {
    font-size: 0.76rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .name-btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }
  .name-btn:hover  { border-color: var(--accent); background: var(--accent-light); }
  .name-btn:active { transform: scale(0.98); }
  .name-btn.c0 { border-color: var(--c0b); }
  .name-btn.c0:hover { background: var(--c0l); border-color: var(--c0); }
  .name-btn.c1 { border-color: var(--c1b); }
  .name-btn.c1:hover { background: var(--c1l); border-color: var(--c1); }
  .name-btn.c2 { border-color: var(--c2b); }
  .name-btn.c2:hover { background: var(--c2l); border-color: var(--c2); }
  .setup-error { font-size: 0.72rem; color: var(--warn); margin-top: 8px; min-height: 16px; }

  /* ── APP ── */
  #appScreen { display: none; max-width: 480px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 16px; padding-top: 4px; }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.9rem;
    font-weight: 900;
    letter-spacing: -0.03em;
  }
  .sync-dot { font-size: 0.63rem; color: var(--muted); margin-top: 2px; height: 13px; }
  .sync-dot.syncing { color: #d4720a; }
  .sync-dot.ok      { color: var(--accent); }
  .sync-dot.error   { color: var(--warn); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .tab-btn {
    flex: 1; padding: 10px 0;
    background: none; border: none; border-right: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 0.77rem; font-weight: 500;
    cursor: pointer; color: var(--muted); transition: all 0.15s;
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active { background: var(--accent); color: #fff; }

  /* ── PERIOD NAV ── */
  .period-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 14px;
  }
  .period-nav button {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    width: 34px; height: 34px; font-size: 1rem; cursor: pointer;
  }
  .period-nav span {
    font-size: 0.78rem; font-weight: 500; min-width: 170px; text-align: center;
  }

  /* ── FAIRNESS ── */
  .fairness-panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 15px; margin-bottom: 13px;
  }
  .panel-title { font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 9px; }
  .person-bar { margin-bottom: 8px; }
  .person-bar:last-child { margin-bottom: 0; }
  .pb-header { display: flex; justify-content: space-between; font-size: 0.72rem; font-weight: 500; margin-bottom: 3px; }
  .pb-track  { height: 7px; background: #f0ece4; border-radius: 99px; overflow: hidden; }
  .pb-fill   { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .fill-0 { background: var(--c0); }
  .fill-1 { background: var(--c1); }
  .fill-2 { background: var(--c2); }

  .fairness-note { font-size: 0.67rem; color: var(--muted); margin-top: 7px; line-height: 1.5; }
  .fairness-note.warn { color: var(--warn); font-weight: 500; }

  /* ── OVERDUE BANNER ── */
  .overdue-banner {
    background: var(--warn); color: #fff;
    border-radius: var(--radius); padding: 10px 14px;
    font-size: 0.74rem; line-height: 1.5; margin-bottom: 12px; display: none;
  }

  /* ── SECTION LABELS ── */
  .section-label {
    font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin: 12px 0 5px;
  }

  /* ── PODIUM ── */
  .podium-panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 15px; margin-bottom: 13px;
  }
  .podium-title { font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; }
  .podium-places {
    display: flex; justify-content: center; align-items: flex-end;
    gap: 8px; margin-bottom: 4px;
  }
  .podium-place {
    flex: 1; text-align: center;
  }
  .podium-emoji { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .podium-name  { font-size: 0.78rem; font-weight: 700; display: block; }
  .podium-score { font-size: 0.65rem; color: var(--muted); display: block; margin-top: 2px; }
  .podium-block {
    margin: 6px auto 0;
    border-radius: 6px 6px 0 0;
    width: 100%;
  }
  .podium-place.first  .podium-block { height: 36px; background: #f5c842; }
  .podium-place.second .podium-block { height: 24px; background: #c0c0c0; }
  .podium-place.third  .podium-block { height: 16px; background: #cd7f32; }
  .podium-month { font-size: 0.65rem; color: var(--muted); text-align: center; margin-top: 6px; }

  /* ── TASK CARDS ── */
  .task-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 13px; margin-bottom: 7px;
    display: flex; align-items: flex-start; gap: 11px;
    cursor: pointer; user-select: none;
    transition: background 0.12s, border-color 0.12s;
  }
  .task-card.done     { background: var(--accent-light); border-color: #c2d9bc; }
  .task-card.done .task-name { color: var(--muted); }
  .task-card.selected { border-color: #aaa; box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }

  .task-check {
    width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px;
    flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; background: #fff; transition: all 0.12s;
  }
  .task-card.done .task-check { background: var(--accent); border-color: var(--accent); color: #fff; }

  .task-info  { flex: 1; min-width: 0; }
  .task-name  { font-size: 0.8rem; font-weight: 500; line-height: 1.35; }
  .task-meta  { font-size: 0.67rem; color: var(--muted); margin-top: 3px; }

  .task-who { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .who-chip {
    font-size: 0.67rem; padding: 3px 9px; border-radius: 99px;
    border: 1.5px solid transparent; cursor: pointer; font-weight: 500;
    transition: all 0.1s; font-family: 'DM Mono', monospace;
  }
  .chip-0    { background: var(--c0l); color: var(--c0); border-color: var(--c0b); }
  .chip-1    { background: var(--c1l); color: var(--c1); border-color: var(--c1b); }
  .chip-2    { background: var(--c2l); color: var(--c2); border-color: var(--c2b); }
  .chip-undo { background: #f5f0e8; color: var(--muted); border-color: var(--border); }
  .who-chip:active { transform: scale(0.95); }

  /* ── ADD ROW ── */
  .add-row { display: flex; gap: 7px; margin-top: 8px; }
  .add-row input {
    flex: 1; padding: 10px 11px;
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 0.76rem;
    background: var(--card); outline: none;
  }
  .add-row input:focus { border-color: var(--accent); }
  .add-row button {
    padding: 10px 13px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 0.76rem; cursor: pointer;
  }

  /* ── WHATSAPP ── */
  .wa-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px;
    background: var(--wa); color: #fff; border: none; border-radius: var(--radius);
    font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500;
    cursor: pointer; margin-top: 16px; transition: opacity 0.12s;
  }
  .wa-btn:active { opacity: 0.85; }

  .switch-link {
    text-align: center; margin-top: 12px;
    font-size: 0.67rem; color: var(--muted); cursor: pointer; text-decoration: underline;
  }

  /* ── LOADING / TOAST ── */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; z-index: 200;
    font-size: 0.77rem; color: var(--muted);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a; color: #fff;
    padding: 10px 20px; border-radius: 99px;
    font-size: 0.73rem; transition: transform 0.3s ease;
    pointer-events: none; white-space: nowrap; z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="spinner"></div>
  <span id="loadingMsg">Connecting…</span>
</div>

<!-- ══ SETUP: name picker only ═══════════════════════════════════════════ -->
<div id="setupScreen">
  <div class="setup-card">
    <h2>🧹 Pembury Clean</h2>
    <p>Who are you?</p>
    <button class="name-btn c0" onclick="pickName('Ben')">Ben</button>
    <button class="name-btn c1" onclick="pickName('Matt')">Matt</button>
    <button class="name-btn c2" onclick="pickName('Giorgia')">Giorgia</button>
    <div class="setup-error" id="setupError"></div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════════════════ -->
<div id="appScreen">
  <header>
    <h1>🧹 Pembury Clean</h1>
    <div class="sync-dot" id="syncDot"></div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tabWeekly"  onclick="switchTab('weekly')">Weekly</button>
    <button class="tab-btn"        id="tabMonthly" onclick="switchTab('monthly')">Monthly</button>
  </div>

  <div class="period-nav">
    <button id="prevPeriod">‹</button>
    <span   id="periodLabel"></span>
    <button id="nextPeriod">›</button>
  </div>

  <div class="fairness-panel">
    <div class="panel-title" id="fairnessTitle">This week's share</div>
    <div id="fairnessBars"></div>
    <div class="fairness-note" id="fairnessNote"></div>
  </div>


  <div class="podium-panel" id="podiumPanel">
    <div class="podium-title" id="podiumTitle">Best Housemate</div>
    <div class="podium-places" id="podiumPlaces"></div>
    <div class="podium-month" id="podiumMonth"></div>
  </div>

  <div class="overdue-banner" id="overdueBanner"></div>

  <div class="section-label" id="taskListLabel">Tap a task · tap your name to claim</div>
  <div id="taskList"></div>

  <div class="add-row">
    <input type="text" id="newTaskInput" placeholder="Add a task…" />
    <button onclick="addTask()">+ Add</button>
  </div>

  <button class="wa-btn" onclick="copyToWhatsApp()">💬 Copy update for WhatsApp</button>
  <div class="switch-link" onclick="switchUser()">Not you? Switch name</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config (pre-baked) ────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwMT6yPUsZYOjNlYxa7j-PIzgdOInZ0mQtNtW6gGghYjJOrH4O-Kr3d9aQtzvX-ZJFR/exec';
const HOUSEMATES = ['Ben', 'Matt', 'Giorgia'];

// ── Default tasks ─────────────────────────────────────────────────────────────
const WEEKLY_TASKS = [
  { id:1, name:'Ground floor hoover + beat rug',                                            cat:'Ground floor' },
  { id:2, name:'Ground floor mop',                                                           cat:'Ground floor' },
  { id:3, name:'Upstairs floor + bathroom hoover',                                           cat:'Upstairs'     },
  { id:4, name:'Upstairs floor + bathroom mop',                                              cat:'Upstairs'     },
  { id:5, name:'Upstairs bathroom — wipe surfaces, viakal shower/sink, toilet, empty bin',   cat:'Upstairs'     },
  { id:6, name:'Downstairs bathroom — wipe surfaces, viakal sink, toilet',                   cat:'Downstairs'   },
  { id:7, name:'Kitchen — clear drying rack, wipe surfaces, empty bins',                     cat:'Kitchen'      },
];

const MONTHLY_TASKS = [
  { id:101, name:'Sweep balcony, clean seating + rails', cat:'Outside' },
  { id:102, name:'Clean fridge',                          cat:'Kitchen' },
  { id:103, name:'Clean oven',                            cat:'Kitchen' },
];

// ── State ─────────────────────────────────────────────────────────────────────
let myName       = null;
let remoteData   = null;
let selectedTask = null;
let activeTab    = 'weekly';
let currentMonday = getMonday(new Date());
let currentMonth  = getMonthKey(new Date());
let saving        = false;

// ── Date helpers ──────────────────────────────────────────────────────────────
function getMonday(d) {
  const date = new Date(d);
  const day  = date.getDay();
  date.setDate(date.getDate() - day + (day===0 ? -6 : 1));
  date.setHours(0,0,0,0);
  return date;
}
function fmtDate(d)     { return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' }); }
function weekKey(m)     { return m.toISOString().slice(0,10); }
function getMonthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function fmtMonth(mk)   {
  const [y,m] = mk.split('-');
  return new Date(+y, +m-1, 1).toLocaleDateString('en-GB', { month:'long', year:'numeric' });
}
function prevMonthKey(mk) {
  const [y,m] = mk.split('-').map(Number);
  return getMonthKey(new Date(y, m-2, 1));
}
function nextMonthKey(mk) {
  const [y,m] = mk.split('-').map(Number);
  return getMonthKey(new Date(y, m, 1));
}

// ── Google Sheets API ────────────────────────────────────────────────────────
async function binRead() {
  const res = await fetch(`${SCRIPT_URL}?action=read`);
  if (!res.ok) throw new Error(res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function binWrite(payload) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'write', data: payload })
  });
  if (!res.ok) throw new Error(res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
}

// ── Local persistence (name only) ─────────────────────────────────────────────
function getSavedName() { return localStorage.getItem('pemburyName') || null; }
function saveName(n)    { localStorage.setItem('pemburyName', n); }
function clearName()    { localStorage.removeItem('pemburyName'); }

// ── Setup ─────────────────────────────────────────────────────────────────────
async function pickName(name) {
  myName = name;
  saveName(name);
  showLoading('Loading tracker…');
  try {
    remoteData = await binRead();
    if (!remoteData || typeof remoteData !== 'object' || Array.isArray(remoteData)) {
      remoteData = { housemates: HOUSEMATES, weeks: {}, months: {} };
      await binWrite(remoteData);
    }
    if (!remoteData.housemates) remoteData.housemates = HOUSEMATES;
    if (!remoteData.weeks)      remoteData.weeks      = {};
    if (!remoteData.months)     remoteData.months     = {};
    launchApp();
  } catch(e) {
    hideLoading();
    document.getElementById('setupError').textContent = 'Could not connect — check your internet and try again.';
  }
}

function switchUser() {
  clearName();
  myName = null;
  document.getElementById('appScreen').style.display   = 'none';
  document.getElementById('setupScreen').style.display = 'block';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function init() {
  // Always show setup screen first - JS will auto-proceed if name is saved
  document.getElementById('setupScreen').style.display = 'block';
  const saved = getSavedName();
  if (saved && HOUSEMATES.includes(saved)) {
    myName = saved;
    await pickName(saved);
  }
}

function showSetup() {
  document.getElementById('setupScreen').style.display = 'block';
  document.getElementById('appScreen').style.display   = 'none';
  hideLoading();
}

function launchApp() {
  hideLoading();
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('appScreen').style.display   = 'block';
  render();
  // Poll every 15s for changes by others
  setInterval(async () => {
    try { remoteData = await binRead(); render(); } catch {}
  }, 15000);
}

// ── Data helpers ──────────────────────────────────────────────────────────────
function getWeekTasks(wk) {
  if (!remoteData.weeks[wk]) {
    remoteData.weeks[wk] = WEEKLY_TASKS.map(t => ({...t, doneBy:null, doneDate:null}));
  }
  return remoteData.weeks[wk];
}
function getMonthTasks(mk) {
  if (!remoteData.months[mk]) {
    remoteData.months[mk] = MONTHLY_TASKS.map(t => ({...t, doneBy:null, doneDate:null}));
  }
  return remoteData.months[mk];
}

async function persist() {
  if (saving) return;
  saving = true;
  setSyncStatus('syncing', 'Saving…');
  try {
    await binWrite(remoteData);
    setSyncStatus('ok', 'Saved ✓');
    setTimeout(() => setSyncStatus('', ''), 2000);
  } catch {
    setSyncStatus('error', 'Save failed — check connection');
  }
  saving = false;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  selectedTask = null;
  document.getElementById('tabWeekly').className  = 'tab-btn' + (tab==='weekly'  ? ' active' : '');
  document.getElementById('tabMonthly').className = 'tab-btn' + (tab==='monthly' ? ' active' : '');
  render();
}

// ── Podium ────────────────────────────────────────────────────────────────────
function renderPodium() {
  const now   = new Date();
  const mk    = getMonthKey(now);
  const label = now.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

  // Aggregate all tasks for this calendar month
  const counts = {};
  HOUSEMATES.forEach(h => counts[h] = 0);

  // Weekly tasks — find all weeks that fall within this month
  if (remoteData.weeks) {
    Object.entries(remoteData.weeks).forEach(([wk, tasks]) => {
      // wk is Monday date; include if month matches
      if (wk.slice(0, 7) === mk || isWeekInMonth(wk, mk)) {
        tasks.forEach(t => { if (t.doneBy && counts[t.doneBy] !== undefined) counts[t.doneBy]++; });
      }
    });
  }

  // Monthly tasks for this month
  if (remoteData.months && remoteData.months[mk]) {
    remoteData.months[mk].forEach(t => { if (t.doneBy && counts[t.doneBy] !== undefined) counts[t.doneBy]++; });
  }

  // Sort housemates by count — in a tie, Ben loses (to avoid looking rigged)
  const ranked = HOUSEMATES
    .map(h => ({ name: h, count: counts[h] }))
    .sort((a, b) => {
      if (b.count !== a.count) return b.count - a.count;
      if (a.name === 'Ben') return 1;
      if (b.name === 'Ben') return -1;
      return 0;
    });

  const medals  = ['🥇', '🥈', '🥉'];
  const classes = ['first', 'second', 'third'];
  // Podium order: 2nd, 1st, 3rd for visual podium shape
  const order   = ranked.length >= 3 ? [ranked[1], ranked[0], ranked[2]] : ranked;
  const orderClasses = ranked.length >= 3 ? ['second', 'first', 'third'] : classes;
  const orderMedals  = ranked.length >= 3 ? [medals[1], medals[0], medals[2]] : medals;

  const placesEl = document.getElementById('podiumPlaces');
  placesEl.innerHTML = order.map((p, i) => `
    <div class="podium-place ${orderClasses[i]}">
      <span class="podium-emoji">${orderMedals[i]}</span>
      <span class="podium-name">${p.name}</span>
      <span class="podium-score">${p.count} task${p.count !== 1 ? 's' : ''}</span>
      <div class="podium-block"></div>
    </div>`).join('');

  document.getElementById('podiumTitle').textContent = 'Best Housemate';
  document.getElementById('podiumMonth').textContent = label;
}

function isWeekInMonth(wk, mk) {
  // Include week if the Monday OR the Sunday falls in the target month
  const monday = new Date(wk);
  const sunday = new Date(wk);
  sunday.setDate(sunday.getDate() + 6);
  return getMonthKey(monday) === mk || getMonthKey(sunday) === mk;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (activeTab === 'weekly') renderWeekly();
  else                        renderMonthly();
  renderPodium();
}

function renderWeekly() {
  const wk     = weekKey(currentMonday);
  const sunday = new Date(currentMonday); sunday.setDate(sunday.getDate()+6);
  document.getElementById('periodLabel').textContent   = `W/C ${fmtDate(currentMonday)} – ${fmtDate(sunday)}`;
  document.getElementById('fairnessTitle').textContent = "This week's share";
  document.getElementById('overdueBanner').style.display = 'none';
  document.getElementById('taskListLabel').textContent = 'Tap a task · tap your name to claim';
  const tasks = getWeekTasks(wk);
  renderFairness(tasks);
  renderTaskList(tasks, wk, 'weekly');
}

function renderMonthly() {
  document.getElementById('periodLabel').textContent   = fmtMonth(currentMonth);
  document.getElementById('fairnessTitle').textContent = "This month's share";
  document.getElementById('taskListLabel').textContent = 'Monthly tasks · tap to claim';

  const tasks   = getMonthTasks(currentMonth);
  const thisMk  = getMonthKey(new Date());
  let overdueNames = [];
  if (remoteData.months) {
    Object.entries(remoteData.months).forEach(([mk, mTasks]) => {
      if (mk >= thisMk) return;
      mTasks.forEach(t => { if (!t.doneBy) overdueNames.push(`${t.name} (${fmtMonth(mk)})`); });
    });
  }
  const banner = document.getElementById('overdueBanner');
  if (overdueNames.length && currentMonth === thisMk) {
    banner.style.display = '';
    banner.innerHTML = `⚠️ <strong>${overdueNames.length} overdue task${overdueNames.length>1?'s':''}:</strong> ` + overdueNames.join(', ');
  } else {
    banner.style.display = 'none';
  }

  renderFairness(tasks);
  renderTaskList(tasks, currentMonth, 'monthly');
}

function renderFairness(tasks) {
  const total  = tasks.length;
  const counts = {};
  HOUSEMATES.forEach(h => counts[h] = 0);
  tasks.forEach(t => { if (t.doneBy && counts[t.doneBy] !== undefined) counts[t.doneBy]++; });
  const done = Object.values(counts).reduce((a,b) => a+b, 0);

  const barsEl = document.getElementById('fairnessBars');
  barsEl.innerHTML = '';
  HOUSEMATES.forEach((name, i) => {
    const pct = total > 0 ? Math.round((counts[name]/total)*100) : 0;
    barsEl.innerHTML += `
      <div class="person-bar">
        <div class="pb-header">
          <span>${name}${name===myName ? ' (you)' : ''}</span>
          <span>${counts[name]}/${total} &nbsp;${pct}%</span>
        </div>
        <div class="pb-track">
          <div class="pb-fill fill-${i}" style="width:${pct}%"></div>
        </div>
      </div>`;
  });

  const noteEl  = document.getElementById('fairnessNote');
  const myPct   = total > 0 ? ((counts[myName]||0)/total)*100 : 0;
  const undone  = total - done;
  if (undone > 0 && myPct > 50) {
    noteEl.textContent = `⚠️ You're doing ${Math.round(myPct)}% — ${undone} task${undone>1?'s':''} still unclaimed.`;
    noteEl.className = 'fairness-note warn';
  } else if (undone > 0) {
    noteEl.textContent = `${undone} task${undone>1?'s':''} still unclaimed.`;
    noteEl.className = 'fairness-note';
  } else {
    noteEl.textContent = '✅ All done — nice work.';
    noteEl.className = 'fairness-note';
  }
}

function renderTaskList(tasks, periodKey, mode) {
  const list     = document.getElementById('taskList');
  const defaults = mode === 'weekly' ? WEEKLY_TASKS : MONTHLY_TASKS;
  const cats     = [...new Set(defaults.map(t => t.cat))];
  const catMap   = {};
  tasks.forEach(t => { (catMap[t.cat] = catMap[t.cat]||[]).push(t); });

  list.innerHTML = '';
  [...cats, 'Added'].forEach(cat => {
    if (!catMap[cat] || catMap[cat].length === 0) return;
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.style.marginTop = '8px';
    lbl.textContent = cat;
    list.appendChild(lbl);
    catMap[cat].forEach(task => list.appendChild(buildCard(task, periodKey, mode)));
  });
}

function buildCard(task, periodKey, mode) {
  const card       = document.createElement('div');
  const isSelected = selectedTask === task.id;
  card.className   = 'task-card'
    + (task.doneBy ? ' done'     : '')
    + (isSelected  ? ' selected' : '');

  card.innerHTML = `
    <div class="task-check">${task.doneBy ? '✓' : ''}</div>
    <div class="task-info">
      <div class="task-name">${task.name}</div>
      ${task.doneBy ? `<div class="task-meta">${task.doneBy} · ${task.doneDate}</div>` : ''}
      ${isSelected ? `
        <div class="task-who">
          ${HOUSEMATES.map((h,i) => `
            <button class="who-chip chip-${i}${task.doneBy===h?' selected':''}" data-who="${h}">
              ${task.doneBy===h ? '✓ ' : ''}${h}
            </button>`).join('')}
          ${task.doneBy ? `<button class="who-chip chip-undo" data-undo="1">✕ Undo</button>` : ''}
        </div>` : ''}
    </div>`;

  card.addEventListener('click', async e => {
    const whoBtn  = e.target.closest('[data-who]');
    const undoBtn = e.target.closest('[data-undo]');

    if (whoBtn) {
      const who   = whoBtn.dataset.who;
      const tasks = mode==='weekly' ? getWeekTasks(periodKey) : getMonthTasks(periodKey);
      const t     = tasks.find(t => t.id === task.id);
      if (t) {
        t.doneBy   = who;
        t.doneDate = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short' });
        selectedTask = null;
        render(); await persist();
      }
      return;
    }
    if (undoBtn) {
      const tasks = mode==='weekly' ? getWeekTasks(periodKey) : getMonthTasks(periodKey);
      const t     = tasks.find(t => t.id === task.id);
      if (t) { t.doneBy = null; t.doneDate = null; selectedTask = null; render(); await persist(); }
      return;
    }
    selectedTask = (selectedTask === task.id) ? null : task.id;
    render();
  });

  return card;
}

// ── Add task ──────────────────────────────────────────────────────────────────
async function addTask() {
  const input = document.getElementById('newTaskInput');
  const name  = input.value.trim();
  if (!name) return;
  if (activeTab === 'weekly') {
    const tasks = getWeekTasks(weekKey(currentMonday));
    tasks.push({ id: Math.max(100, ...tasks.map(t=>t.id))+1, name, cat:'Added', doneBy:null, doneDate:null });
  } else {
    const tasks = getMonthTasks(currentMonth);
    tasks.push({ id: Math.max(200, ...tasks.map(t=>t.id))+1, name, cat:'Added', doneBy:null, doneDate:null });
  }
  input.value = '';
  render(); await persist();
}
document.getElementById('newTaskInput').addEventListener('keydown', e => { if (e.key==='Enter') addTask(); });

// ── Period navigation ─────────────────────────────────────────────────────────
document.getElementById('prevPeriod').addEventListener('click', () => {
  if (activeTab==='weekly') currentMonday.setDate(currentMonday.getDate()-7);
  else currentMonth = prevMonthKey(currentMonth);
  selectedTask = null; render();
});
document.getElementById('nextPeriod').addEventListener('click', () => {
  if (activeTab==='weekly') currentMonday.setDate(currentMonday.getDate()+7);
  else currentMonth = nextMonthKey(currentMonth);
  selectedTask = null; render();
});

// ── WhatsApp ──────────────────────────────────────────────────────────────────
function copyToWhatsApp() {
  const counts = {};
  HOUSEMATES.forEach(h => counts[h] = 0);

  let msg, tasks, done, undone;

  if (activeTab === 'weekly') {
    const wk     = weekKey(currentMonday);
    const sunday = new Date(currentMonday); sunday.setDate(sunday.getDate()+6);
    tasks  = getWeekTasks(wk);
    done   = tasks.filter(t => t.doneBy);
    undone = tasks.filter(t => !t.doneBy);
    done.forEach(t => { if (counts[t.doneBy]!==undefined) counts[t.doneBy]++; });

    msg = `🧹 *Pembury Clean — W/C ${fmtDate(currentMonday)}*\n\n`;
    if (done.length)  { msg += `*Done ✅*\n`;         done.forEach(t=>{msg+=`• ${t.name}: ${t.doneBy} (${t.doneDate})\n`;}); msg+='\n'; }
    if (undone.length){ msg += `*Still needed 🔄*\n`; undone.forEach(t=>{msg+=`• ${t.name}\n`;}); msg+='\n'; }
    msg += `*Share this week*\n`;
  } else {
    tasks  = getMonthTasks(currentMonth);
    done   = tasks.filter(t => t.doneBy);
    undone = tasks.filter(t => !t.doneBy);
    done.forEach(t => { if (counts[t.doneBy]!==undefined) counts[t.doneBy]++; });

    msg = `🧹 *Pembury Clean — ${fmtMonth(currentMonth)}*\n\n`;
    if (done.length)  { msg += `*Done ✅*\n`;         done.forEach(t=>{msg+=`• ${t.name}: ${t.doneBy} (${t.doneDate})\n`;}); msg+='\n'; }
    if (undone.length){ msg += `*Still needed 🔄*\n`; undone.forEach(t=>{msg+=`• ${t.name}\n`;}); msg+='\n'; }
    msg += `*Share this month*\n`;
  }

  HOUSEMATES.forEach(h => {
    const pct = tasks.length > 0 ? Math.round((counts[h]/tasks.length)*100) : 0;
    msg += `${h}: ${'█'.repeat(Math.round(pct/10))}${'░'.repeat(10-Math.round(pct/10))} ${pct}%\n`;
  });
  if (undone.length) msg += `\n👆 ${undone.length} task${undone.length>1?'s':''} up for grabs`;

  navigator.clipboard.writeText(msg)
    .then(()  => showToast('Copied! Paste into WhatsApp 📋'))
    .catch(()  => {
      const ta = document.createElement('textarea');
      ta.value = msg; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showToast('Copied! Paste into WhatsApp 📋');
    });
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showLoading(msg) { document.getElementById('loadingMsg').textContent=msg; document.getElementById('loadingOverlay').style.display='flex'; }
function hideLoading()    { document.getElementById('loadingOverlay').style.display='none'; }
function setSyncStatus(cls, text) {
  const el = document.getElementById('syncDot');
  el.className = 'sync-dot' + (cls ? ` ${cls}` : '');
  el.textContent = text;
}
function showToast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

init();
</script>
